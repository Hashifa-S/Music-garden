<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CD Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Caveat:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f7f6f2;
      color: #2c2c2a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    /*--Steps trackimg thingy--*/
    .tracker { display: flex; align-items: center; margin-bottom: 56px; }
    .tracker-line { width: 72px; height: 1.5px; background: #dddbd5; position: relative; overflow: hidden; }
    .tracker-line-fill { position: absolute; top: 0; left: 0; height: 100%; background: #e8d97a; transition: width 0.4s ease; width: 0%; }
    .tracker-step {
      width: 30px; height: 30px; border-radius: 50%;
      border: 1.5px solid #dddbd5; background: #f7f6f2;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: #aaa8a2;
      transition: border-color 0.3s, color 0.3s, background 0.3s; flex-shrink: 0;
    }
    .tracker-step.active { border-color: #e8d97a; color: #7a6e1a; background: #fdfbef; }
    .tracker-step.done   { border-color: #e8d97a; background: #e8d97a; color: #7a6e1a; }

    /*--Main thingy--*/
    .card {
      background: #fff; border: 1px solid #e8e7e2; border-radius: 16px;
      padding: 48px 52px; width: 100%; max-width: 520px;
    }
    .step-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #b5b3ad; margin-bottom: 8px; }
    h1 { font-size: 22px; font-weight: 500; color: #2c2c2a; margin-bottom: 32px; line-height: 1.3; }

    /*--Inputs-- */
    input[type="text"], input[type="url"] {
      width: 100%; padding: 11px 14px;
      border: 1px solid #e0ded8; border-radius: 8px;
      font-family: inherit; font-size: 14px;
      color: #2c2c2a; background: #fafaf8;
      outline: none; transition: border-color 0.2s;
    }
    input[type="text"]:focus, input[type="url"]:focus { border-color: #c8bf6a; background: #fff; }
    input::placeholder { color: #c4c2bb; }

    /*--Buttons-- */
    .btn {
      display: inline-block; padding: 10px 24px; border-radius: 8px;
      font-family: inherit; font-size: 14px; cursor: pointer;
      transition: background 0.2s; border: 1px solid #e0ded8;
      background: #f7f6f2; color: #2c2c2a;
    }
    .btn:hover { background: #eeecea; }
    .btn-primary { background: #2c2c2a; color: #f7f6f2; border-color: #2c2c2a; }
    .btn-primary:hover { background: #444441; }
    .btn-sm { padding: 7px 16px; font-size: 13px; }
    .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; }

    /*--CD Preview (Step 1)--*/
    .cd-wrap { display: flex; justify-content: center; margin: 32px 0; }
    .cd {
      width: 148px; height: 148px; border-radius: 50%;
      border: 1px solid #e8e7e2; background: #f0efe9;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden; cursor: pointer; transition: border-color 0.2s;
    }
    .cd:hover { border-color: #c8bf6a; }
    .cd-hole { width: 22px; height: 22px; border-radius: 50%; background: #f7f6f2; border: 1px solid #e0ded8; position: absolute; z-index: 2; }
    .cd-label { font-size: 11px; color: #b5b3ad; text-align: center; position: absolute; z-index: 1; bottom: 42px; }
    .cd-title-text { font-size: 10px; font-weight: 500; color: #7a7870; text-align: center; position: absolute; z-index: 1; top: 44px; max-width: 90px; word-break: break-word; }
    #cd-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 50%; z-index: 0; }
    #upload-input { display: none; }
    .upload-hint { font-size: 12px; color: #b5b3ad; text-align: center; margin-top: 8px; }

    /*--2nd step add song--*/
    .add-song-block{ display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px; }
    .add-song-block input {width: 100%;}

    /*Error msg*/
    .input-error { border-color: #e8a87a !important; }
    .error-msg { font-size: 11px; color: #c07a50; margin-top: -4px; margin-bottom: 4px; min-height: 16px; }

    /*Song Queue*/
    #song-queue { list-style: none; margin-top: 20px; }
    #song-queue li {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 0; border-bottom: 1px solid #foefe9; font-size: 13px;
    }
    #song-queue li:last-child { border-bottom: none; }
    .song-num {color: #c4c2bb; font-size: 11px; min-width: 18px;}
    .song-remove { color: #c4c2bb; cursor: pointer; font-size: 18px; line-height: 1; background: none; border: none; }
    .song-remove:hover { color: #888; }
    .empty-hint { font-size: 12px; color: #c4c2bb; text-align: center; padding: 20px 0; }

    /*--3rd step flowerssss--*/
    .flower-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
    .flower-option {
      width: 64px; height: 64px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; background: #f0efe9;
      transition: border-color 0.2s, transform 0.15s; user-select: none;
    }
    .flower-option:hover { transform: scale(1.08); }
    .flower-option:selected {border-color: #c8bf6a; background: #fdfbef; }
    .bouquet {
      min-height: 72px; display: flex; flex-wrap: wrap; gap: 4px;
      align-items: center; margin-top: 12px; padding: 12px;
      background: #fafaf8; border-radius: 12px; border: 1px solid #eee;
    }
    .bouquet-flower { font-size: 26px; }

    /*--4th step cute note and song playyy--*/
     .scene { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-bottom: 24px; }

    .note-row { display: flex; align-items: center; gap: 10px; width: 100%; justify-content: center; }

    .note-flowers { display: flex; flex-direction: column; gap: 0; align-items: center; flex-shrink: 0; width: 36px; }
    .note-flower-item { font-size: 22px; line-height: 1.1; display: block; }

    .note-card {
      flex: 1; max-width: 280px; background: #fffef5;
      border: 1px solid #e8e4c8; border-radius: 4px;
      padding: 14px 16px 10px; position: relative;
    }
    .note-card::before {
      content: ''; position: absolute; top: -10px; left: 50%;
      transform: translateX(-50%); width: 48px; height: 18px;
      background: rgba(232,217,122,0.45); border-radius: 2px;
      border: 1px solid rgba(200,191,106,0.3);
    }
    .note-lines { position: absolute; top: 14px; left: 0; right: 0; bottom: 10px; pointer-events: none; overflow: hidden; }
    .note-rule { position: absolute; left: 16px; right: 16px; height: 1px; background: #e8e4c8; }
    .note-textarea {
      width: 100%; font-family: 'Caveat', cursive; font-size: 17px; color: #3a3630;
      background: transparent; border: none; outline: none; resize: none;
      line-height: 28px; min-height: 84px; position: relative; z-index: 1; padding: 0;
    }
    .note-textarea::placeholder { color: #c8c4a4; }

    .note-display {
      font-family: 'Caveat', cursive; font-size: 18px; color: #3a3630;
      text-align: center; line-height: 1.5; min-height: 28px;
      max-width: 240px; word-break: break-word;
    }

    /*--User POV--*/
    .player-area { display: flex; flex-direction: column; align-items: center; }

    .player-cd {
      width: 168px; height: 168px; border-radius: 50%;
      border: 1px solid #e0ded8; background: #f0efe9;
      position: relative; overflow: hidden;
      animation: spin 3.5s linear infinite; animation-play-state: paused;
      transition: box-shadow 0.3s;
    }
    .player-cd.playing { animation-play-state: running; box-shadow: 0 0 0 4px #fdfbef, 0 0 0 5px #e8d97a; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .player-cd-grooves {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%;
      background: repeating-radial-gradient(circle at 50% 50%, transparent 0px, transparent 6px, rgba(255,255,255,0.04) 6px, rgba(255,255,255,0.04) 7px);
      z-index: 1; pointer-events: none;
    }
    #player-cd-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 50%; z-index: 0; }

    .player-cd-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
    .player-cd-hole {
      width: 24px; height: 24px; border-radius: 50%;
      background: #f7f6f2; border: 1px solid #e0ded8; position: absolute; z-index: 3;
      animation: counter-spin 3.5s linear infinite; animation-play-state: paused;
    }
    .player-cd-hole.playing { animation-play-state: running; }
    @keyframes counter-spin { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }

    .above-disc { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-bottom: 10px; }

    .now-playing-title { font-size: 14px; font-weight: 500; color: #2c2c2a; margin-top: 18px; text-align: center; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .now-playing-channel { font-size: 12px; color: #aaa8a2; margin-top: 4px; text-align: center; }

    /*--Control part--*/
    .controls { display: flex; align-items: center; gap: 16px; margin: 18px 0 24px; }
    .ctrl.btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid #e0ded8; background: #f7f6f2; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #888; transition: background 0.15s; padding: 0;
    }
    .ctrl-btn:hover { background: #eeecea; }
    .play-btn {
      width: 48px; height: 48px; border-radius: 50%;
      border: 1.5px solid #2c2c2a; background: #2c2c2a; color: #f7f6f2;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: background 0.15s; padding: 0;
    }
    .play-btn:hover { background: #444441; }

    /*--Playlist--*/
    .playlist { list-style: none; width: 100%; border-top: 1px solid #f0efe9; padding-top: 8px; }
    .playlist li { diplay: flex; align-items: center; padding: 9px 8px; border-radius: 8px; cursor: pointer; gap: 10px; transition: background 0.15s; }
    .playlist li:hover { background: #fafaf8; }
    .playlist li.active-track { background: #fdfbef; }
    .playlist-num { font-size: 11px; color: #c4c2bb; min-width: 16px; text-align: right; }
    .playing-dot { width: 6px; height: 6px; borde-radius: 50%; background: #c8bf6a; flex-shrink: 0; animation: pulse 1s ease-in-out infinite alternate; }
    @keyframes pulse {from { opacity: 0.4; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); }}
    .playlist-title { flex: 1; font-size: 13px; color: #2c2c2a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /*--share link--*/
    .share-link-row { display: flex; gap: 8px; align-items: center; }
    .share-link-row input { flex: 1; font-size: 13px; color: #7a7870; background: #fafaf8; }
    .copied-msg { font-size: 12px; color: #a0954a; margin-top: 8px; min-height: 16px; }

    /*--Hidden--*/
    .step-panel { display: none; }
    .step-panel.active { display: block; }

    /*--Hidden yt play--*/
    #yt-player { position: fixed; bottom: -9999px; left: 0; width: 1px; height: 1px; pointer-events: none; }
      </style>
</head>
<body>
  
</body>
